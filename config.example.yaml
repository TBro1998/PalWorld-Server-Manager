# Palworld Server Manager Configuration
# 复制此文件为 config.yaml 并根据需要修改配置

# 服务器设置
host: "127.0.0.1"  # Web 界面监听地址（Docker/对外访问请设为 0.0.0.0）
port: 8080          # Web 界面端口

# 数据库设置
database_path: "./palworld.db"  # SQLite 数据库路径

# JWT 认证
jwt_secret: "change-me-in-production"  # JWT 签名密钥（生产环境请务必修改！）

# Palworld 服务器路径
steamcmd_path: "./steamcmd"        # SteamCMD 安装路径
palworld_base_path: "./palworld"   # Palworld 服务器基础目录

# 创意工坊 Mod 下载账号
# Palworld 是付费游戏，其创意工坊内容无法用匿名登录下载，必须使用【拥有 Palworld 的 Steam 账号】。
# 本工具只使用用户名、不处理密码/两步验证：请先在终端手动执行一次
#   steamcmd +login <账号>
# 输入 Steam Guard 验证码完成登录（SteamCMD 会缓存会话），之后本工具即可复用该会话下载 Mod。
# 留空则回退匿名登录（对 Palworld Mod 会下载失败）。
steam_username: ""

# 自动更新设置（固定开启，通过界面操作更新）
github_repo: "TBro1998/PalWorld-Server-Manager"  # GitHub 仓库（国内用户可配置镜像源）
# 镜像源示例:
# - GitHub 官方: "TBro1998/PalWorld-Server-Manager"
# - Gitee 镜像: "your-gitee-user/palworld-server-manager" (如果有的话)
