name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub Release & upload assets
  packages: write   # push to ghcr.io

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for release notes

      # -----------------------------------------------------------------------
      # Collect version metadata from the pushed tag
      - name: Version info
        id: version
        run: |
          echo "VERSION=${GITHUB_REF_NAME}"               >> "$GITHUB_OUTPUT"
          echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "GIT_COMMIT=${GITHUB_SHA::8}"              >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Build frontend once; the Go cross-compile steps embed ui/out
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: ui
        run: bun install --frozen-lockfile

      - name: Build frontend (static export)
        working-directory: ui
        run: bun run build

      # -----------------------------------------------------------------------
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # -----------------------------------------------------------------------
      # Windows amd64
      - name: Build — Windows amd64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          go build -trimpath \
            -ldflags "-s -w \
              -X main.Version=${{ steps.version.outputs.VERSION }} \
              -X main.BuildTime=${{ steps.version.outputs.BUILD_TIME }} \
              -X main.GitCommit=${{ steps.version.outputs.GIT_COMMIT }}" \
            -o psm_windows_amd64.exe .

      # -----------------------------------------------------------------------
      # Linux amd64
      - name: Build — Linux amd64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          go build -trimpath \
            -ldflags "-s -w \
              -X main.Version=${{ steps.version.outputs.VERSION }} \
              -X main.BuildTime=${{ steps.version.outputs.BUILD_TIME }} \
              -X main.GitCommit=${{ steps.version.outputs.GIT_COMMIT }}" \
            -o psm_linux_amd64 .

      # -----------------------------------------------------------------------
      # Docker — build & push to GitHub Container Registry
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/palworld-server-manager:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/palworld-server-manager:latest
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            BUILD_TIME=${{ steps.version.outputs.BUILD_TIME }}
            GIT_COMMIT=${{ steps.version.outputs.GIT_COMMIT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------------
      # GitHub Release — attach binaries and auto-generate notes
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            psm_windows_amd64.exe
            psm_linux_amd64
          generate_release_notes: true
          make_latest: true
