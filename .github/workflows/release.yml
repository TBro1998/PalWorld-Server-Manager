name: Release

on:
  push:
    tags:
      - 'v*'


permissions:
  contents: write   # create GitHub Release & upload assets
  models: read      # GitHub Models API (Claude)

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history for release notes

      # -----------------------------------------------------------------------
      # Collect version metadata from the pushed tag
      - name: Version info
        id: version
        run: |
          echo "VERSION=${GITHUB_REF_NAME}"               >> "$GITHUB_OUTPUT"
          echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "GIT_COMMIT=${GITHUB_SHA::8}"              >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Build frontend once; the Go cross-compile steps embed ui/out
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: ui
        run: bun install --frozen-lockfile

      - name: Build frontend (static export)
        working-directory: ui
        run: bun run build

      # -----------------------------------------------------------------------
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      # -----------------------------------------------------------------------
      # Embed the application icon (and version metadata) into the Windows exe.
      # goversioninfo emits a COFF .syso that the Go linker picks up for
      # windows/amd64 automatically; the _windows_amd64 suffix scopes it to that
      # target, so the Linux build below ignores it.
      - name: Generate Windows icon resource
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          V="${{ steps.version.outputs.VERSION }}"; V="${V#v}"
          IFS='.' read -r MA MI PA <<< "${V%%-*}"
          MA=${MA:-0}; MI=${MI:-0}; PA=${PA:-0}
          "$(go env GOPATH)/bin/goversioninfo" \
            -64 \
            -icon=ui/src/app/favicon.ico \
            -o=resource_windows_amd64.syso \
            -ver-major="$MA" -ver-minor="$MI" -ver-patch="$PA" \
            -product-ver-major="$MA" -product-ver-minor="$MI" -product-ver-patch="$PA" \
            versioninfo.json

      # -----------------------------------------------------------------------
      # Windows amd64
      - name: Build — Windows amd64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          go build -trimpath \
            -ldflags "-s -w \
              -X main.Version=${{ steps.version.outputs.VERSION }} \
              -X main.BuildTime=${{ steps.version.outputs.BUILD_TIME }} \
              -X main.GitCommit=${{ steps.version.outputs.GIT_COMMIT }}" \
            -o palsm_windows_amd64.exe .

      # -----------------------------------------------------------------------
      # Linux amd64
      - name: Build — Linux amd64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          go build -trimpath \
            -ldflags "-s -w \
              -X main.Version=${{ steps.version.outputs.VERSION }} \
              -X main.BuildTime=${{ steps.version.outputs.BUILD_TIME }} \
              -X main.GitCommit=${{ steps.version.outputs.GIT_COMMIT }}" \
            -o palsm_linux_amd64 .

      # -----------------------------------------------------------------------
      # Docker — build & push to Docker Hub
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/palsm:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/palsm:latest
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            BUILD_TIME=${{ steps.version.outputs.BUILD_TIME }}
            GIT_COMMIT=${{ steps.version.outputs.GIT_COMMIT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------------
      # Generate release notes via GitHub Models (Claude)
      # Falls back to conventional-commit parser if the API call fails.
      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          AI_MODEL: ${{ vars.RELEASE_NOTES_MODEL || 'gpt-4.1-mini' }}
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null \
                 || git rev-list --max-parents=0 HEAD)
          RANGE="${PREV}..HEAD"
          echo "Generating notes for range: ${RANGE}"

          COMMITS=$(git log "${RANGE}" --pretty=format:"- %s (%h)" --no-merges)

          # ── AI path via GitHub Models ──────────────────────────────────────
          PAYLOAD=$(jq -n \
            --arg ver   "$VERSION" \
            --arg log   "$COMMITS" \
            --arg model "$AI_MODEL" \
            '{
              model: $model,
              messages: [{
                role: "user",
                content: (
                  "你是一位精通中文、英文和日文的专业软件发布说明撰写员。\n\n" +
                  "请根据以下 git commit 列表，为 " + $ver + " 版本生成三语 Release Notes。\n\n" +
                  "格式要求：\n" +
                  "- 先输出完整的【中文版本】，用单独一行 --- 分隔后输出完整的【英文版本】，再用 --- 分隔后输出完整的【日文版本】\n" +
                  "- 三个语言版本各自独立，每个版本内按变更类型分组（新功能/New Features/新機能、问题修复/Bug Fixes/バグ修正、性能优化/Performance/パフォーマンス改善、重构/Refactoring/リファクタリング、文档/Documentation/ドキュメント、CI/CD、其他/Other/その他）\n" +
                  "- 每个有内容的分组使用带 emoji 的二级标题（仅该语言），中文示例：## 🚀 新功能，英文示例：## 🚀 New Features，日文示例：## 🚀 新機能\n" +
                  "- 每条变更一行，格式：`- 该语言的简洁描述 (commit hash)`\n" +
                  "- 描述要简洁地道，符合各语言习惯\n" +
                  "- --- 分隔线前后不加任何额外文字或标注\n" +
                  "- 只输出纯 Markdown，不要包裹在代码块中\n\n" +
                  "Commit 列表：\n" + $log
                )
              }],
              max_tokens: 1500,
              temperature: 0.2
            }')

          AI_RESPONSE=$(curl -sf \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://models.inference.ai.azure.com/chat/completions" || true)

          AI_BODY=$(echo "$AI_RESPONSE" | jq -r '.choices[0].message.content // empty' 2>/dev/null || true)

          if [ -n "$AI_BODY" ] && [ "$AI_BODY" != "null" ]; then
            echo "$AI_BODY" > /tmp/release_notes.md
            echo "✅ Release notes generated by Claude."
          else
            echo "⚠️  GitHub Models unavailable, falling back to conventional-commit parser."

            # ── Fallback: parse conventional commits locally ─────────────────
            > /tmp/s_feat.txt; > /tmp/s_fix.txt;      > /tmp/s_perf.txt
            > /tmp/s_refactor.txt; > /tmp/s_docs.txt; > /tmp/s_ci.txt
            > /tmp/s_chore.txt;    > /tmp/s_other.txt

            # Regex patterns stored in variables — referencing them unquoted
            # inside [[ =~ ]] avoids the "unexpected token )" parser error that
            # occurs when parens/brackets are written inline.
            re_scope='\(([^)]+)\)'
            re_feat='^feat(\([^)]+\))?:'
            re_fix='^fix(\([^)]+\))?:'
            re_perf='^perf(\([^)]+\))?:'
            re_refactor='^refactor(\([^)]+\))?:'
            re_docs='^docs(\([^)]+\))?:'
            re_ci='^ci(\([^)]+\))?:'
            re_chore='^chore(\([^)]+\))?:'

            while IFS='|' read -r msg hash; do
              body="${msg#*: }"
              scope=""
              [[ "$msg" =~ $re_scope ]] && scope=" (\`${BASH_REMATCH[1]}\`)"
              line="- ${body}${scope} — \`${hash}\`"
              if   [[ "$msg" =~ $re_feat ]];     then echo "$line" >> /tmp/s_feat.txt
              elif [[ "$msg" =~ $re_fix ]];      then echo "$line" >> /tmp/s_fix.txt
              elif [[ "$msg" =~ $re_perf ]];     then echo "$line" >> /tmp/s_perf.txt
              elif [[ "$msg" =~ $re_refactor ]]; then echo "$line" >> /tmp/s_refactor.txt
              elif [[ "$msg" =~ $re_docs ]];     then echo "$line" >> /tmp/s_docs.txt
              elif [[ "$msg" =~ $re_ci ]];       then echo "$line" >> /tmp/s_ci.txt
              elif [[ "$msg" =~ $re_chore ]];    then echo "$line" >> /tmp/s_chore.txt
              else  echo "$line" >> /tmp/s_other.txt
              fi
            done < <(git log "${RANGE}" --pretty=format:"%s|%h" --no-merges)

            section() {
              local title="$1" file="$2"
              [ -s "$file" ] && printf "## %s\n%s\n\n" "$title" "$(cat "$file")"
            }
            # 中文版本
            {
              section "🚀 新功能"   /tmp/s_feat.txt
              section "🐛 问题修复" /tmp/s_fix.txt
              section "⚡ 性能优化" /tmp/s_perf.txt
              section "🔨 重构"     /tmp/s_refactor.txt
              section "📖 文档"     /tmp/s_docs.txt
              section "⚙️ CI/CD"   /tmp/s_ci.txt
              section "🔧 其他改动" /tmp/s_chore.txt
              section "📌 其他提交" /tmp/s_other.txt
            } > /tmp/notes_zh.md
            # English version
            {
              section "🚀 New Features"   /tmp/s_feat.txt
              section "🐛 Bug Fixes"      /tmp/s_fix.txt
              section "⚡ Performance"     /tmp/s_perf.txt
              section "🔨 Refactoring"     /tmp/s_refactor.txt
              section "📖 Documentation"   /tmp/s_docs.txt
              section "⚙️ CI/CD"           /tmp/s_ci.txt
              section "🔧 Other Changes"   /tmp/s_chore.txt
              section "📌 Other Commits"   /tmp/s_other.txt
            } > /tmp/notes_en.md
            # 日本語版
            {
              section "🚀 新機能"             /tmp/s_feat.txt
              section "🐛 バグ修正"           /tmp/s_fix.txt
              section "⚡ パフォーマンス改善"  /tmp/s_perf.txt
              section "🔨 リファクタリング"    /tmp/s_refactor.txt
              section "📖 ドキュメント"        /tmp/s_docs.txt
              section "⚙️ CI/CD"              /tmp/s_ci.txt
              section "🔧 その他の変更"        /tmp/s_chore.txt
              section "📌 その他のコミット"    /tmp/s_other.txt
            } > /tmp/notes_ja.md
            # 三语合并，用 --- 分隔
            {
              cat /tmp/notes_zh.md
              if [ -s /tmp/notes_en.md ]; then printf "\n---\n\n"; cat /tmp/notes_en.md; fi
              if [ -s /tmp/notes_ja.md ]; then printf "\n---\n\n"; cat /tmp/notes_ja.md; fi
            } > /tmp/release_notes.md
          fi

          [ -s /tmp/release_notes.md ] \
            || echo "No documented changes in this release." > /tmp/release_notes.md

          echo "--- Preview ---"
          cat /tmp/release_notes.md

      # -----------------------------------------------------------------------
      # Generate SHA-256 checksums for all binary assets.
      # The self-update mechanism performs best-effort verification against this
      # file when it is present in the release.
      - name: Generate checksums
        run: |
          sha256sum palsm_windows_amd64.exe palsm_linux_amd64 > checksums.txt
          echo "--- checksums.txt ---"
          cat checksums.txt

      # -----------------------------------------------------------------------
      # GitHub Release — attach binaries with generated notes
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            palsm_windows_amd64.exe
            palsm_linux_amd64
            checksums.txt
          body_path: /tmp/release_notes.md
          make_latest: true
