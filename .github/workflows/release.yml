name: Release

on:
  push:
    tags:
      - 'v*'


permissions:
  contents: write   # create GitHub Release & upload assets
  models: read      # GitHub Models API (Claude)

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history for release notes

      # -----------------------------------------------------------------------
      # Collect version metadata from the pushed tag
      - name: Version info
        id: version
        run: |
          echo "VERSION=${GITHUB_REF_NAME}"               >> "$GITHUB_OUTPUT"
          echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "GIT_COMMIT=${GITHUB_SHA::8}"              >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Build frontend once; the Go cross-compile steps embed ui/out
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: ui
        run: bun install --frozen-lockfile

      - name: Build frontend (static export)
        working-directory: ui
        run: bun run build

      # -----------------------------------------------------------------------
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      # -----------------------------------------------------------------------
      # Windows amd64
      - name: Build — Windows amd64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          go build -trimpath \
            -ldflags "-s -w \
              -X main.Version=${{ steps.version.outputs.VERSION }} \
              -X main.BuildTime=${{ steps.version.outputs.BUILD_TIME }} \
              -X main.GitCommit=${{ steps.version.outputs.GIT_COMMIT }}" \
            -o palsm_windows_amd64.exe .

      # -----------------------------------------------------------------------
      # Linux amd64
      - name: Build — Linux amd64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          go build -trimpath \
            -ldflags "-s -w \
              -X main.Version=${{ steps.version.outputs.VERSION }} \
              -X main.BuildTime=${{ steps.version.outputs.BUILD_TIME }} \
              -X main.GitCommit=${{ steps.version.outputs.GIT_COMMIT }}" \
            -o palsm_linux_amd64 .

      # -----------------------------------------------------------------------
      # Docker — build & push to Docker Hub
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/palsm:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/palsm:latest
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            BUILD_TIME=${{ steps.version.outputs.BUILD_TIME }}
            GIT_COMMIT=${{ steps.version.outputs.GIT_COMMIT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------------
      # Generate release notes via GitHub Models (Claude)
      # Falls back to conventional-commit parser if the API call fails.
      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          AI_MODEL: ${{ vars.RELEASE_NOTES_MODEL || 'gpt-4.1-mini' }}
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null \
                 || git rev-list --max-parents=0 HEAD)
          RANGE="${PREV}..HEAD"
          echo "Generating notes for range: ${RANGE}"

          COMMITS=$(git log "${RANGE}" --pretty=format:"- %s (%h)" --no-merges)

          # ── AI path via GitHub Models ──────────────────────────────────────
          PAYLOAD=$(jq -n \
            --arg ver   "$VERSION" \
            --arg log   "$COMMITS" \
            --arg model "$AI_MODEL" \
            '{
              model: $model,
              messages: [{
                role: "user",
                content: (
                  "你是一位专业的软件发布说明撰写员。\n\n" +
                  "请根据以下 git commit 列表，为 " + $ver + " 版本生成 Release Notes。\n\n" +
                  "要求：\n" +
                  "- 按变更类型分组（新功能、问题修复、性能优化、重构、文档、CI/CD、其他）\n" +
                  "- 每个有内容的分组使用带 emoji 的二级标题，中英双语，例如：## 🚀 新功能 / New Features\n" +
                  "- 每条变更一行，格式：`- 简洁描述 (commit hash)`\n" +
                  "- 描述语言与 commit message 保持一致（中文提交则中文描述）\n" +
                  "- 不要输出 commit hash 以外的额外解释，不要输出分隔线\n" +
                  "- 只输出纯 Markdown，不要包裹在代码块中\n\n" +
                  "Commit 列表：\n" + $log
                )
              }],
              max_tokens: 1500,
              temperature: 0.2
            }')

          AI_RESPONSE=$(curl -sf \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://models.inference.ai.azure.com/chat/completions" || true)

          AI_BODY=$(echo "$AI_RESPONSE" | jq -r '.choices[0].message.content // empty' 2>/dev/null || true)

          if [ -n "$AI_BODY" ] && [ "$AI_BODY" != "null" ]; then
            echo "$AI_BODY" > /tmp/release_notes.md
            echo "✅ Release notes generated by Claude."
          else
            echo "⚠️  GitHub Models unavailable, falling back to conventional-commit parser."

            # ── Fallback: parse conventional commits locally ─────────────────
            > /tmp/s_feat.txt; > /tmp/s_fix.txt;      > /tmp/s_perf.txt
            > /tmp/s_refactor.txt; > /tmp/s_docs.txt; > /tmp/s_ci.txt
            > /tmp/s_chore.txt;    > /tmp/s_other.txt

            # Regex patterns stored in variables — referencing them unquoted
            # inside [[ =~ ]] avoids the "unexpected token )" parser error that
            # occurs when parens/brackets are written inline.
            re_scope='\(([^)]+)\)'
            re_feat='^feat(\([^)]+\))?:'
            re_fix='^fix(\([^)]+\))?:'
            re_perf='^perf(\([^)]+\))?:'
            re_refactor='^refactor(\([^)]+\))?:'
            re_docs='^docs(\([^)]+\))?:'
            re_ci='^ci(\([^)]+\))?:'
            re_chore='^chore(\([^)]+\))?:'

            while IFS='|' read -r msg hash; do
              body="${msg#*: }"
              scope=""
              [[ "$msg" =~ $re_scope ]] && scope=" (\`${BASH_REMATCH[1]}\`)"
              line="- ${body}${scope} — \`${hash}\`"
              if   [[ "$msg" =~ $re_feat ]];     then echo "$line" >> /tmp/s_feat.txt
              elif [[ "$msg" =~ $re_fix ]];      then echo "$line" >> /tmp/s_fix.txt
              elif [[ "$msg" =~ $re_perf ]];     then echo "$line" >> /tmp/s_perf.txt
              elif [[ "$msg" =~ $re_refactor ]]; then echo "$line" >> /tmp/s_refactor.txt
              elif [[ "$msg" =~ $re_docs ]];     then echo "$line" >> /tmp/s_docs.txt
              elif [[ "$msg" =~ $re_ci ]];       then echo "$line" >> /tmp/s_ci.txt
              elif [[ "$msg" =~ $re_chore ]];    then echo "$line" >> /tmp/s_chore.txt
              else  echo "$line" >> /tmp/s_other.txt
              fi
            done < <(git log "${RANGE}" --pretty=format:"%s|%h" --no-merges)

            section() {
              local title="$1" file="$2"
              [ -s "$file" ] && printf "## %s\n%s\n\n" "$title" "$(cat "$file")"
            }
            {
              section "🚀 新功能 / New Features"     /tmp/s_feat.txt
              section "🐛 问题修复 / Bug Fixes"      /tmp/s_fix.txt
              section "⚡ 性能优化 / Performance"    /tmp/s_perf.txt
              section "🔨 重构 / Refactoring"        /tmp/s_refactor.txt
              section "📖 文档 / Documentation"      /tmp/s_docs.txt
              section "⚙️ CI/CD"                     /tmp/s_ci.txt
              section "🔧 其他改动 / Other Changes"  /tmp/s_chore.txt
              section "📌 其他提交 / Other Commits"  /tmp/s_other.txt
            } > /tmp/release_notes.md
          fi

          [ -s /tmp/release_notes.md ] \
            || echo "No documented changes in this release." > /tmp/release_notes.md

          echo "--- Preview ---"
          cat /tmp/release_notes.md

      # -----------------------------------------------------------------------
      # Generate SHA-256 checksums for all binary assets.
      # The self-update mechanism performs best-effort verification against this
      # file when it is present in the release.
      - name: Generate checksums
        run: |
          sha256sum palsm_windows_amd64.exe palsm_linux_amd64 > checksums.txt
          echo "--- checksums.txt ---"
          cat checksums.txt

      # -----------------------------------------------------------------------
      # GitHub Release — attach binaries with generated notes
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            palsm_windows_amd64.exe
            palsm_linux_amd64
            checksums.txt
          body_path: /tmp/release_notes.md
          make_latest: true
